data_process:
  data_base_dir: './valid_permission'
  accounts_dir: 'accounts'
  instructs_dir: 'instructs'
  label_file: 'answer_valid_permission.json'

runtime:
  output_dir: './outputs'
  limit: 1

prompt:
  base_prompt_template_path: './cfg/prompt_template.txt'
  rewrite_enabled: true
  rewrite_system_prompt_path: './prompt/prompt_rewrite_system.txt'
  rewrite_user_instruction: '请重写以下 prompt，并保留其核心语义。输出仅包含重写后的 prompt 文本，目标是生成使用 Python z3 库的 Python 代码。'

llm:
  base_url: 'https://api.siliconflow.cn/v1/chat/completions'
  api_key_env: 'sk-ziwfobfdevetcibhytppdcakzxaenrhvexfdbcznpwtjiqjt'
  request_timeout: 120

  rewrite_model: 'Pro/Qwen/Qwen2.5-7B-Instruct'
  rewrite_temperature: 0.1
  rewrite_max_tokens: 4096

  generation_model: 'Qwen/Qwen2.5-Coder-32B-Instruct'
  generation_temperature: 0.1
  generation_max_tokens: 4096
  generation_system_prompt_path: './prompt/smt_generation_system.txt'